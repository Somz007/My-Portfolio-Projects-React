{% extends 'base.html' %}

{% block title %}New Post{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">

    <h1 class="h3 mb-4 fw-semibold">New Post</h1>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="" novalidate>

          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Title</label>
            <input type="text" class="form-control form-control-lg" id="title"
                   name="title" maxlength="200" required autofocus
                   placeholder="Give your post a title…">
          </div>

          <div class="mb-4">
            <label for="body" class="form-label fw-semibold">Content</label>
            <textarea class="form-control" id="body" name="body"
                      rows="14" required
                      placeholder="Write your post here…"></textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Publish</button>
            <a href="{{ url_for('blog.index') }}" class="btn btn-outline-secondary">
              Cancel
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
