{% extends 'base.html' %}

{% block title %}Edit Post{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">

    <h1 class="h3 mb-4 fw-semibold">Edit Post</h1>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="" novalidate>

          {# CSRF token — Flask-WTF validates this on every POST request #}
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Title</label>
            <!-- value="{{ post.title }}" pre-fills the input with the existing content -->
            <input type="text" class="form-control form-control-lg" id="title"
                   name="title" maxlength="200" required autofocus
                   value="{{ post.title }}">
          </div>

          <div class="mb-4">
            <label for="body" class="form-label fw-semibold">Content</label>
            <!-- Textarea content goes between the tags, not in a value attribute -->
            <textarea class="form-control" id="body" name="body"
                      rows="14" required>{{ post.body }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            <a href="{{ url_for('blog.post', id=post.id) }}"
               class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
