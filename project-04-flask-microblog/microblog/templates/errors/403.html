{% extends 'base.html' %}

{% block title %}Forbidden{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 text-center py-5">
    <p class="display-1 fw-semibold text-muted mb-0">403</p>
    <h1 class="h3 mb-3">Access forbidden</h1>
    <p class="text-muted mb-4">
      You don't have permission to perform this action. You can only edit or
      delete your own posts.
    </p>
    <a href="{{ url_for('blog.index') }}" class="btn btn-primary">
      ← Back to home
    </a>
  </div>
</div>
{% endblock %}
