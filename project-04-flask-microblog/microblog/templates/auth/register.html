{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-8 col-md-6 col-lg-5">

    <div class="card shadow-sm">
      <div class="card-body p-4 p-md-5">

        <h1 class="h3 mb-4 text-center fw-semibold">Create Account</h1>

        <form method="POST" action="" novalidate>

          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   minlength="3" maxlength="80" autocomplete="username" required autofocus>
            <div class="form-text">Minimum 3 characters. Used in your profile URL.</div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="email"
                   autocomplete="email" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   minlength="6" autocomplete="new-password" required>
            <div class="form-text">Minimum 6 characters.</div>
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label">Confirm password</label>
            <input type="password" class="form-control" id="confirm_password"
                   name="confirm_password" autocomplete="new-password" required>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Create Account</button>
          </div>

        </form>

        <hr class="my-4">

        <p class="text-center text-muted small mb-0">
          Already have an account?
          <a href="{{ url_for('auth.login') }}">Log in here</a>
        </p>

      </div>
    </div>

  </div>
</div>
{% endblock %}
